<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📱 Point of Sale - JA BizTown</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f6; padding: 20px; display: flex; justify-content: center; }
        .tablet { background: white; width: 400px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); padding: 30px; border: 8px solid #333; }
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #eee; padding-bottom: 15px; margin-bottom: 20px; }
        h1 { margin: 0; font-size: 20px; color: #2c3e50; }
        .network-badge { padding: 5px 12px; border-radius: 20px; font-weight: bold; font-size: 12px; cursor: pointer; user-select: none; transition: 0.3s; }
        .badge-online { background-color: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .badge-offline { background-color: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        .balance-card { background: linear-gradient(135deg, #0052cc, #007bff); color: white; padding: 20px; border-radius: 12px; text-align: center; margin-bottom: 25px; }
        .balance-card h2 { margin: 0 0 10px 0; font-size: 14px; opacity: 0.8; }
        .balance-card .amount { font-size: 36px; font-weight: bold; margin: 0; }
        .action-btn { width: 100%; background-color: #28a745; color: white; border: none; padding: 15px; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; transition: 0.2s; margin-bottom: 20px; }
        .action-btn:active { transform: scale(0.98); }
        .outbox-section { background-color: #f8f9fa; border: 1px solid #dee2e6; border-radius: 8px; padding: 15px; }
        .outbox-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .outbox-header h3 { margin: 0; font-size: 14px; color: #495057; }
        .badge-count { background: #6c757d; color: white; border-radius: 10px; padding: 2px 8px; font-size: 12px; }
        #logArea { height: 120px; overflow-y: auto; font-family: monospace; font-size: 11px; background: #fff; border: 1px solid #ccc; padding: 5px; color: #555; }
        .log-error { color: #dc3545; }
        .log-success { color: #28a745; }
        .log-info { color: #0056b3; }
    </style>
</head>
<body>

<div class="tablet">
    <div class="header">
        <h1>Retail POS System</h1>
        <!-- NETWORK TOGGLE -->
        <div id="networkToggle" class="network-badge badge-online" onclick="toggleNetwork()">
            🟢 ONLINE (Click to Disconnect)
        </div>
    </div>

    <div class="balance-card">
        <h2>STUDENT BALANCE</h2>
        <div id="balanceDisplay" class="amount">$50.00</div>
    </div>

    <!-- ACTION BUTTON -->
    <button class="action-btn" onclick="processSale()">🛒 Process Sale ($5.00)</button>

    <!-- OUTBOX / DATABASE QUEUE -->
    <div class="outbox-section">
        <div class="outbox-header">
            <h3>IndexedDB Outbox Queue</h3>
            <span id="outboxCount" class="badge-count">0</span>
        </div>
        <div id="logArea"></div>
    </div>
</div>

<script>
    // --- STATE SIMULATION ---
    let isOnline = true;
    let studentBalance = 50.00;
    let outboxQueue = JSON.parse(localStorage.getItem('ja_outbox')) || [];
    const API_URL = "http://localhost:5000/api/transaction";

    // Initialize UI
    updateUI();

    // --- NETWORK LOGIC ---
    function toggleNetwork() {
        isOnline = !isOnline;
        const toggleBtn = document.getElementById('networkToggle');
        if (isOnline) {
            toggleBtn.className = "network-badge badge-online";
            toggleBtn.innerHTML = "🟢 ONLINE (Click to Disconnect)";
            logMessage("Network Restored. Triggering Background Sync...", "log-success");
            backgroundSync(); // Instantly try to flush the queue when back online!
        } else {
            toggleBtn.className = "network-badge badge-offline";
            toggleBtn.innerHTML = "🔴 OFFLINE (Click to Reconnect)";
            logMessage("Network Dropped. Switching to Optimistic Offline Mode.", "log-error");
        }
    }

    // --- TRANSACTION LOGIC (OPTIMISTIC UI) ---
    async function processSale() {
        if (studentBalance < 5.00) { alert("Insufficient funds!"); return; }

        // 1. OPTIMISTIC UI UPDATE
        // The balance deducts instantly so the student doesn't sit frozen waiting for WiFi
        studentBalance -= 5.00;
        updateUI();

        // 2. PREPARE DATA
        const transaction = {
            id: 'TXN-' + Math.floor(Math.random() * 10000),
            student: 'Student123',
            amount: 5.00,
            timestamp: new Date().toISOString()
        };

        logMessage(`Optimistic UI updated for ${transaction.id}. Attempting API Call...`, "log-info");

        // 3. ATTEMPT NETWORK CALL OR QUEUE IT
        if (isOnline) {
            try {
                await sendToBackend(transaction);
                logMessage(`✅ Successfully synced ${transaction.id} to Azure SQL.`, "log-success");
            } catch (err) {
                // If it fails even while "Online", push to Outbox
                queueTransaction(transaction);
            }
        } else {
            // Actively offline - immediately queue
            queueTransaction(transaction);
        }
    }

    // --- QUEUE LOGIC ---
    function queueTransaction(transaction) {
        outboxQueue.push(transaction);
        localStorage.setItem('ja_outbox', JSON.stringify(outboxQueue));
        logMessage(`⚠️ Offline. Added ${transaction.id} to Local Outbox.`, "log-error");
        updateUI();
    }

    // --- BACKGROUND SYNC (THE RECOVERY) ---
    async function backgroundSync() {
        if (outboxQueue.length === 0) return;
        if (!isOnline) return;

        logMessage(`Starting background sync for ${outboxQueue.length} items...`, "log-info");

        // We copy the array and clear the queue temporarily to handle race conditions
        const queueToProcess = [...outboxQueue];
        outboxQueue = []; 
        
        for (let i = 0; i < queueToProcess.length; i++) {
            const txn = queueToProcess[i];
            try {
                await sendToBackend(txn);
                logMessage(`🔄 Synced offline queued item: ${txn.id}`, "log-success");
            } catch (err) {
                // Network failed mid-sync, put it back in the queue
                logMessage(`Failed to sync ${txn.id}, requeuing...`, "log-error");
                outboxQueue.push(txn);
            }
        }
        localStorage.setItem('ja_outbox', JSON.stringify(outboxQueue));
        updateUI();
    }

    // --- API HELPER ---
    async function sendToBackend(data) {
        const response = await fetch(API_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(data)
        });
        if (!response.ok) throw new Error("Server rejected");
        return await response.json();
    }

    // --- VIEW HELPERS ---
    function updateUI() {
        document.getElementById('balanceDisplay').innerText = `$${studentBalance.toFixed(2)}`;
        document.getElementById('outboxCount').innerText = outboxQueue.length;
    }

    function logMessage(msg, className) {
        const logArea = document.getElementById('logArea');
        const p = document.createElement('div');
        p.className = className;
        const time = new Date().toLocaleTimeString();
        p.innerText = `[${time}] ${msg}`;
        logArea.prepend(p);
    }
</script>
</body>
</html>
